<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Remember helps you save ideas and products locally on your own device.">
  <title>Remember | Login</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/login.js" defer></script>
</head>
<body>
  <main class="login-page" aria-labelledby="app-title">
    <section class="login-card" aria-describedby="app-description">
      <div class="brand-block">
        <p class="eyebrow">Personal workspace</p>
        <h1 id="app-title">Remember</h1>
        <p class="tagline">
          Capture every idea.<br>
          Remember every product.
        </p>
      </div>

      <p id="app-description" class="description">
        Store your ideas and products safely on your own device.
      </p>

      <ul class="privacy-list" aria-label="Privacy promises">
        <li>No cloud.</li>
        <li>No tracking.</li>
        <li>No advertisements.</li>
        <li>Everything stays with you.</li>
      </ul>

      <form class="login-form" id="loginForm" novalidate>
        <div class="field-group">
          <label for="userName">Your name</label>
          <input
            type="text"
            id="userName"
            name="userName"
            placeholder="Enter your name"
            autocomplete="name"
            minlength="2"
            maxlength="40"
            aria-describedby="nameMessage"
            required
          >
          <p class="message" id="nameMessage" aria-live="polite"></p>
        </div>

        <button type="submit" class="continue-button">Continue</button>
      </form>
    </section>
  </main>
</body>
</html>
